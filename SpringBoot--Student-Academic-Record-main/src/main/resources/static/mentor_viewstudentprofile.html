<!DOCTYPE html>
<html>
<head>
    <title>Student Profile</title>

    <style>

        body{
        font-family:Arial;
        background:#f5f6fa;
        margin:0;
        }

        .header{
        background:#2f3640;
        color:white;
        padding:15px;
        font-size:20px;
        }

        .container{
        padding:30px;
        }

        .card{
        background:white;
        padding:20px;
        margin-bottom:20px;
        border-radius:8px;
        box-shadow:0 2px 6px rgba(0,0,0,0.1);
        }

        table{
        width:100%;
        border-collapse:collapse;
        margin-top:10px;
        }

        th,td{
        border:1px solid #ddd;
        padding:8px;
        text-align:left;
        }

        th{
        background:#f1f2f6;
        }

        .status-approved{
        color:green;
        font-weight:bold;
        }

        .status-pending{
        color:orange;
        font-weight:bold;
        }

        .export-btn{
        margin-bottom:20px;
        padding:10px 15px;
        border:none;
        background:#2f3640;
        color:white;
        cursor:pointer;
        border-radius:4px;
        }

    </style>

</head>

<body>

<div class="header">
    Student Profile
</div>

<div class="container">

    <button class="export-btn" onclick="exportProfile()">Export Profile</button>

    <div class="card">

        <h2>Student Information</h2>

        <p><b>Name:</b> <span id="name"></span></p>
        <p><b>USN:</b> <span id="usn"></span></p>
        <p><b>Department:</b> <span id="department"></span></p>
        <p><b>Academic Year:</b> <span id="year"></span></p>

    </div>

    <div class="card">

        <h2>Marks</h2>

        <table>

            <thead>
            <tr>
                <th>Semester</th>
                <th>Marks</th>
                <th>Status</th>
            </tr>
            </thead>

            <tbody id="marksTable"></tbody>

        </table>

    </div>

    <div class="card">

        <h2>Certificates</h2>

        <table>

            <thead>
            <tr>
                <th>Title</th>
                <th>Status</th>
            </tr>
            </thead>

            <tbody id="certTable"></tbody>

        </table>

    </div>

</div>

<!-- Correct way to load html2pdf -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<script>

    const params = new URLSearchParams(window.location.search);
    const studentId = params.get("studentId");

    if(!studentId){
    alert("Student ID missing in URL");
    }

    async function loadProfile(){

    const res = await fetch(`/api/mentor/student/${studentId}`,{
    credentials:"include"
    });

    const data = await res.json();

    const student = data.student;

    document.getElementById("name").innerText = student.name;
    document.getElementById("usn").innerText = student.usn;
    document.getElementById("department").innerText = student.department;
    document.getElementById("year").innerText = student.academicYear;

    document.getElementById("marksTable").innerHTML =
    data.marks.map(m=>`
    <tr>
    <td>${m.semester ?? "-"}</td>
    <td>${m.totalMarks ?? "-"}</td>
    <td class="${m.validated ? "status-approved":"status-pending"}">
    ${m.validated ? "APPROVED":"PENDING"}
    </td>
    </tr>
    `).join("");

    document.getElementById("certTable").innerHTML =
    data.certificates.map(c=>`
    <tr>
    <td>${c.title ?? "-"}</td>
    <td class="${c.status==="APPROVED" ? "status-approved":"status-pending"}">
    ${c.status ?? "PENDING"}
    </td>
    </tr>
    `).join("");

    }

    loadProfile();

    function exportProfile(){

    const element = document.body;

    const opt = {
    margin:0.5,
    filename:'student-profile.pdf',
    image:{type:'jpeg',quality:1},
    html2canvas:{scale:2},
    jsPDF:{unit:'in',format:'a4',orientation:'portrait'}
    };

    html2pdf().set(opt).from(element).save();

    }

</script>

</body>
</html>
