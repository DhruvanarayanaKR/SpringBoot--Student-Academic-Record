<!DOCTYPE html>
<html>
<head>
    <title>Page Not Found</title>

    <style>

        body{
          font-family:Arial;
          background:#f4f7fb;
          display:flex;
          justify-content:center;
          align-items:center;
          height:100vh;
        }

        .box{
          background:white;
          padding:40px;
          border-radius:10px;
          box-shadow:0 8px 25px rgba(0,0,0,0.08);
          text-align:center;
        }

        h1{
          font-size:60px;
          margin:0;
        }

        p{
          color:#777;
        }

        a{
          display:inline-block;
          margin-top:15px;
          text-decoration:none;
          background:#1976d2;
          color:white;
          padding:10px 18px;
          border-radius:6px;
        }

    </style>

</head>

<body>

<div class="box">

    <h1>404</h1>

    <p>The page you are looking for does not exist.</p>

    <a href="http://localhost:8080/index.html">Return to Dashboard</a>

</div>

</body>
</html>
