<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Reset Password | Student Portal</title>

    <style>
        * { box-sizing: border-box; }

        body {
          font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
          background: linear-gradient(135deg, #74ebd5 0%, #9face6 100%);
          display: flex;
          justify-content: center;
          align-items: center;
          min-height: 100vh;
          margin: 0;
        }

        .box {
          background: #fff;
          padding: 40px 35px;
          border-radius: 16px;
          box-shadow: 0px 10px 25px rgba(0,0,0,0.2);
          width: 480px;
          text-align: center;
          animation: fadeIn 0.6s ease-in-out;
        }

        h2 {
          margin-bottom: 25px;
          color: #333;
        }

        label {
          display: block;
          margin: 15px 0 5px;
          text-align: left;
          font-weight: 500;
          color: #444;
          font-size: 14px;
        }

        input {
          width: 100%;
          padding: 12px;
          margin-bottom: 12px;
          border: 1px solid #ccc;
          border-radius: 8px;
          font-size: 14px;
        }

        input:focus {
          border-color: #6a11cb;
          box-shadow: 0 0 6px rgba(106, 17, 203, 0.3);
        }

        button {
          background: linear-gradient(135deg, #6a11cb, #2575fc);
          color: white;
          padding: 14px;
          border: none;
          border-radius: 10px;
          width: 100%;
          font-size: 16px;
          font-weight: bold;
          cursor: pointer;
          margin-top: 10px;
          transition: transform 0.2s ease, background 0.3s ease;
        }

        button:hover {
          transform: scale(1.03);
          background: linear-gradient(135deg, #5a0eb5, #1e63d6);
        }

        #response {
          margin-top: 15px;
          font-weight: bold;
        }

        .success { color: green; }
        .error { color: red; }

        @keyframes fadeIn {
          from { opacity: 0; transform: translateY(-20px); }
          to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>

<body>

<div class="box">
    <h2>Reset Password</h2>

    <form onsubmit="resetPassword(event)">

        <!-- TOKEN -->
        <input type="hidden" id="token">

        <label>New Password:</label>
        <input type="password" id="password" required>

        <label>Confirm Password:</label>
        <input type="password" id="confirmPassword" required>

        <button type="submit">Reset Password</button>
    </form>

    <p id="response"></p>
</div>

<script>
    // Extract token from URL
    const params = new URLSearchParams(window.location.search);
    const token = params.get("token");
    document.getElementById("token").value = token;

    async function resetPassword(e) {
      e.preventDefault();

      const password = document.getElementById("password").value;
      const confirmPassword = document.getElementById("confirmPassword").value;
      const responseText = document.getElementById("response");

      responseText.className = "";
      responseText.innerText = "";

      // ✅ validation
      if (password !== confirmPassword) {
        responseText.className = "error";
        responseText.innerText = "Passwords do not match";
        return;
      }

      try {
        const res = await fetch("/api/auth/reset-password", {
          method: "POST",
          headers: { "Content-Type": "application/x-www-form-urlencoded" },
          body: new URLSearchParams({
            token: token,
            newPassword: password
          })
        });

        const msg = await res.text();

        if (res.ok) {
          responseText.className = "success";
          responseText.innerText = msg;

          setTimeout(() => {
            window.location.href = "login.html";
          }, 2000);
        } else {
          responseText.className = "error";
          responseText.innerText = msg;
        }

      } catch (err) {
        responseText.className = "error";
        responseText.innerText = "Something went wrong";
      }
    }
</script>

</body>
</html>
